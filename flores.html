<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-BOUQUET_v8.2 // PURE_ART</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 0 0 250px rgba(0,0,0,0.95) inset;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <canvas id="cyberCanvas"></canvas>

    <script>
        const canvas = document.getElementById('cyberCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, cx, cy;
        let tieX, tieY; 
        let globalTime = 0; 
        
        let scaleFactor, maxFlowerRadius, bouqTop;

        const NUM_MAIN_FLOWERS = 16; 
        const NUM_VORTEX_PARTICLES = 250; 
        const NUM_VOLUME_PARTICLES = 200; 
        
        let mainFlowers = [];
        let particles = [];

        const COLOR_MAIN = '252, 238, 10'; 
        const COLOR_CENTER = '111, 78, 55'; 
        const COLORS_PARTICLES = ['0, 243, 255', '255, 0, 100', '255, 255, 255', '200, 255, 255']; 

        function drawPolygon(ctx, x, y, radius, sides, angle) {
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const a = angle + (i * Math.PI * 2) / sides;
                const px = x + Math.cos(a) * radius;
                const py = y + Math.sin(a) * radius;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

        class UnifiedParticle {
            constructor(type) {
                this.type = type; 
                this.reset();
                if(this.type === 'vortex') this.progress = Math.random(); 
            }

            reset() {
                this.color = COLORS_PARTICLES[Math.floor(Math.random() * COLORS_PARTICLES.length)];
                this.size = 1.5 + Math.random() * 3;
                this.isHollow = Math.random() > 0.5;
                this.spinAngle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;

                if (this.type === 'vortex') {
                    this.progress = 0; 
                    this.speed = 0.002 + Math.random() * 0.002; 
                    this.side = Math.random() > 0.5 ? 1 : -1; 
                    const spawnAngle = this.side === 1 ? 0 : Math.PI;
                    this.startAngle = spawnAngle + (Math.random() - 0.5) * 1.2; 
                    
                } else {
                    const r = Math.random() * maxFlowerRadius;
                    const theta = Math.random() * Math.PI * 2;
                    this.x = cx + Math.cos(theta) * r;
                    this.y = (cy * 0.65) + Math.sin(theta) * r * 0.5; 
                    this.vx = (Math.random() - 0.5) * 0.2;
                    this.vy = (Math.random() - 0.5) * 0.2;
                    this.life = 1;
                    this.decay = Math.random() * 0.01 + 0.005;
                    this.maxOpacity = 0.2 + Math.random() * 0.5;
                }
            }

            draw() {
                this.spinAngle += this.rotSpeed;

                if (this.type === 'vortex') {
                    this.progress += this.speed;
                    if (this.progress >= 1) this.reset();
                    const startY = bouqTop - 10; 
                    const currentY = startY + this.progress * (tieY - startY);
                    const currentRadius = (maxFlowerRadius * 1.2) * (1 - this.progress * 0.85); 
                    const rotations = 1.5; 
                    const currentAngle = this.startAngle + (this.progress * Math.PI * 2 * rotations) * this.side + (globalTime * this.side);
                    const x3d = Math.cos(currentAngle) * currentRadius;
                    const z3d = Math.sin(currentAngle) * currentRadius;
                    const focalLength = 400;
                    const scale3d = focalLength / (focalLength + z3d);
                    this.drawX = cx + x3d * scale3d;
                    this.drawY = currentY;
                    this.drawScale = scale3d;
                    this.drawOpacity = (1 - this.progress) * 1.5;
                    if (this.drawOpacity > 1) this.drawOpacity = 1;
                    if (this.progress < 0.1) this.drawOpacity *= (this.progress / 0.1); 
                    if (z3d > 0) this.drawOpacity *= 0.3; 
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life -= this.decay;
                    if (this.life <= 0) this.reset();
                    this.drawX = this.x;
                    this.drawY = this.y;
                    this.drawScale = 1;
                    this.drawOpacity = this.maxOpacity * Math.sin(this.life * Math.PI); 
                }

                ctx.save();
                ctx.translate(this.drawX, this.drawY);
                ctx.scale(this.drawScale, this.drawScale);
                ctx.rotate(this.spinAngle);
                ctx.shadowBlur = 8;
                ctx.shadowColor = `rgba(${this.color}, ${this.drawOpacity})`;
                if (this.isHollow) {
                    ctx.strokeStyle = `rgba(${this.color}, ${this.drawOpacity})`;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                } else {
                    ctx.fillStyle = `rgba(${this.color}, ${this.drawOpacity})`;
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                }
                ctx.restore();
            }
        }

        class HexFlower {
            constructor(id) {
                this.id = id;
                this.color = COLOR_MAIN;
                this.centerColor = COLOR_CENTER;
                this.baseSize = 14 + Math.random() * 6; 
                this.pulse = Math.random() * Math.PI * 2;
                const scaleFactorOriginal = Math.min(width, height) * 0.06; 
                const angle = this.id * 137.5 * (Math.PI / 180); 
                const radius = scaleFactorOriginal * Math.sqrt(this.id);
                this.targetX = cx + Math.cos(angle) * radius;
                this.targetY = (cy * 0.65) + Math.sin(angle) * radius * 0.5; 
                this.floatSpeed = 1 + Math.random() * 2; 
                this.floatOffset = Math.random() * Math.PI * 2;
                this.currentX = this.targetX;
                this.currentY = this.targetY;
                this.mainAngle = 0; 
                this.centerAngle = 0; 
                this.spawnDelay = Math.random() * 1.5; 
                this.growFactor = 0; 
            }

            update() {
                let elapsed = Math.abs(globalTime);
                if (elapsed > this.spawnDelay) {
                    this.growFactor += (1 - this.growFactor) * 0.08; 
                    if (this.growFactor > 0.99) this.growFactor = 1;
                }
                this.currentY = this.targetY + Math.sin(elapsed * this.floatSpeed + this.floatOffset) * 4 * this.growFactor;
                this.mainAngle -= 0.005; 
                this.centerAngle += 0.06; 
            }

            draw() {
                if (this.growFactor <= 0.01) return;
                this.pulse += 0.05;
                const glow = 15 + Math.abs(Math.sin(this.pulse)) * 10; 
                ctx.save();
                ctx.translate(this.currentX, this.currentY);
                const bootSpin = (1 - this.growFactor) * Math.PI * 4; 
                ctx.scale(this.growFactor, this.growFactor);
                ctx.rotate(Math.PI / 6 + this.mainAngle + bootSpin); 
                ctx.shadowBlur = glow;
                ctx.shadowColor = `rgba(${this.color}, 0.9)`;
                ctx.strokeStyle = `rgba(${this.color}, 0.9)`;
                ctx.lineWidth = 2.5;
                drawPolygon(ctx, 0, 0, this.baseSize, 6, 0);
                ctx.stroke();
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = `rgba(${this.color}, 0.6)`;
                ctx.lineWidth = 1;
                drawPolygon(ctx, 0, 0, this.baseSize * 0.75, 6, 0);
                ctx.stroke();
                ctx.setLineDash([]); 
                ctx.rotate(-(Math.PI / 6 + this.mainAngle + bootSpin)); 
                const playSize = this.baseSize * 0.35;
                ctx.fillStyle = `rgba(${this.color}, 1)`;
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.moveTo(-playSize * 0.5, -playSize * 0.8);
                ctx.lineTo(-playSize * 0.5, playSize * 0.8); 
                ctx.lineTo(playSize * 0.8, 0);              
                ctx.closePath();
                ctx.fill();
                ctx.restore(); 
                ctx.save();
                ctx.translate(this.currentX, this.currentY);
                ctx.scale(this.growFactor, this.growFactor); 
                ctx.rotate(this.centerAngle);
                ctx.fillStyle = `rgba(${this.centerColor}, 1)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(${this.centerColor}, 1)`;
                const coreSize = 3;
                ctx.fillRect(-coreSize/2, -coreSize/2, coreSize, coreSize);
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            cx = width / 2;
            cy = height / 2; 
            tieX = cx;
            tieY = height * 0.88; 
            globalTime = 0; 
            scaleFactor = Math.min(width, height) * 0.06;
            maxFlowerRadius = scaleFactor * Math.sqrt(NUM_MAIN_FLOWERS - 1);
            bouqTop = (cy * 0.65) - (maxFlowerRadius * 0.5); 
            mainFlowers = [];
            for (let i = 0; i < NUM_MAIN_FLOWERS; i++) mainFlowers.push(new HexFlower(i));
            particles = [];
            for (let i = 0; i < NUM_VORTEX_PARTICLES; i++) particles.push(new UnifiedParticle('vortex'));
            for (let i = 0; i < NUM_VOLUME_PARTICLES; i++) particles.push(new UnifiedParticle('volume'));
        }

        function drawProjectorAndRays() {
            ctx.save();
            mainFlowers.forEach((flower) => {
                if (flower.growFactor <= 0.01) return;
                ctx.strokeStyle = `rgba(252, 238, 10, 0.3)`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = `rgba(252, 238, 10, 0.5)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(tieX, tieY);
                const targetRayY = tieY - (tieY - flower.currentY) * flower.growFactor;
                const targetRayX = tieX + (flower.currentX - tieX) * flower.growFactor;
                ctx.lineTo(targetRayX, targetRayY);
                ctx.stroke();
            });
            ctx.translate(tieX, tieY);
            ctx.scale(1, 0.25);
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0, 243, 255, 1)`;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `rgba(0, 243, 255, 1)`;
            ctx.stroke();
            ctx.restore();
        }

        function animate() {
            requestAnimationFrame(animate);
            globalTime -= 0.01; 
            mainFlowers.forEach(flower => flower.update());
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(2, 2, 2, 0.35)'; 
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter'; 
            drawProjectorAndRays();
            particles.forEach(p => p.draw()); 
            mainFlowers.forEach(flower => flower.draw()); 
        }

        window.addEventListener('resize', init);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); init(); }, {passive: false});
        init();
        animate();
    </script>
</body>
</html>
