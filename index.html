<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flores anahi</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030303;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .scanlines,
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .scanlines {
      background:
        linear-gradient(
          to bottom,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.18) 50%,
          rgba(0,0,0,0.18) 100%
        );
      background-size: 100% 4px;
      z-index: 10;
      opacity: 0.65;
    }

    .vignette {
      box-shadow: inset 0 0 180px rgba(0,0,0,0.88);
      z-index: 9;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <canvas id="cyberCanvas"></canvas>

  <script>
    const canvas = document.getElementById('cyberCanvas');
    const ctx = canvas.getContext('2d');

    let w = 0, h = 0, cx = 0, cy = 0;
    let isMobile = false;

    let time = 0;
    let intro = 0;

    let pointer = {
      x: 0, y: 0,
      tx: 0, ty: 0
    };

    const COLORS = {
      flower: '252, 238, 10',
      center: '111, 78, 55',
      cyan: '0, 243, 255',
      magenta: '255, 0, 120',
      white: '255,255,255'
    };

    const bouquet = {
      tieX: 0,
      tieY: 0,
      stemTopY: 0,
      wrapTopY: 0,
      flowers: [],
      sideParticles: [],
      vortexParticles: [],
      sparkles: []
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInOutSine(t) {
      return -(Math.cos(Math.PI * t) - 1) / 2;
    }

    function drawPolygon(x, y, radius, sides, rotation = 0) {
      ctx.beginPath();
      for (let i = 0; i < sides; i++) {
        const a = rotation + (i * Math.PI * 2) / sides;
        const px = x + Math.cos(a) * radius;
        const py = y + Math.sin(a) * radius;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    class Flower {
      constructor(cfg) {
        this.baseX = cfg.x;
        this.baseY = cfg.y;
        this.size = cfg.size;
        this.depth = cfg.depth;
        this.delay = cfg.delay;
        this.floatOffset = Math.random() * Math.PI * 2;
        this.rot = Math.random() * Math.PI * 2;
        this.coreRot = Math.random() * Math.PI * 2;
        this.pulseOffset = Math.random() * Math.PI * 2;
      }

      appear() {
        return easeOutCubic(clamp((intro - this.delay) / 0.24, 0, 1));
      }

      getPosition() {
        const influenceX = pointer.x * (8 - this.depth * 4);
        const influenceY = pointer.y * (5 - this.depth * 2.2);
        const floatY = Math.sin(time * 1.15 + this.floatOffset) * (1.4 + (1 - this.depth) * 1.4);
        const floatX = Math.cos(time * 0.75 + this.floatOffset) * (0.6 + (1 - this.depth) * 0.5);

        return {
          x: this.baseX + influenceX + floatX,
          y: this.baseY + influenceY + floatY
        };
      }

      drawStem(originX, originY) {
        const ap = this.appear();
        if (ap <= 0) return;

        const pos = this.getPosition();
        const sx = lerp(originX, pos.x, ap * 0.94);
        const sy = lerp(originY, pos.y + 10, ap);

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(originX, originY);
        ctx.lineTo(sx, sy);
        ctx.strokeStyle = `rgba(${COLORS.flower}, ${0.10 + ap * 0.12})`;
        ctx.lineWidth = this.depth > 0.2 ? 0.9 : 1.15;
        ctx.shadowBlur = 4;
        ctx.shadowColor = `rgba(${COLORS.flower}, 0.24)`;
        ctx.stroke();
        ctx.restore();
      }

      draw() {
        const ap = this.appear();
        if (ap <= 0) return;

        const pos = this.getPosition();
        const pulse = 0.92 + Math.sin(time * 1.7 + this.pulseOffset) * 0.06;
        const scale = ap * pulse * (1 - this.depth * 0.07);
        const glow = 11 + (1 - this.depth) * 10 + Math.sin(time * 2.1 + this.pulseOffset) * 2.5;

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.scale(scale, scale);

        this.rot += 0.0022 * (1 - this.depth * 0.3);
        ctx.rotate(this.rot + Math.PI / 6);

        ctx.shadowBlur = glow;
        ctx.shadowColor = `rgba(${COLORS.flower}, 0.92)`;
        ctx.strokeStyle = `rgba(${COLORS.flower}, ${0.9 - this.depth * 0.22})`;
        ctx.lineWidth = 2;

        drawPolygon(0, 0, this.size, 6, 0);
        ctx.stroke();

        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = `rgba(${COLORS.flower}, ${0.44 - this.depth * 0.12})`;
        ctx.lineWidth = 1;
        drawPolygon(0, 0, this.size * 0.72, 6, 0);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.rotate(-(this.rot + Math.PI / 6));

        const tri = this.size * 0.34;
        ctx.fillStyle = `rgba(${COLORS.flower}, 1)`;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.moveTo(-tri * 0.45, -tri * 0.8);
        ctx.lineTo(-tri * 0.45, tri * 0.8);
        ctx.lineTo(tri * 0.92, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.scale(scale, scale);

        this.coreRot += 0.03;
        ctx.rotate(this.coreRot);

        ctx.fillStyle = `rgba(${COLORS.center}, 1)`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgba(${COLORS.center}, 1)`;
        const c = 2.8;
        ctx.fillRect(-c / 2, -c / 2, c, c);

        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 5;
        ctx.shadowColor = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, 1, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    class SideParticle {
      constructor(side) {
        this.side = side;
        this.reset(true);
      }

      reset(initial = false) {
        this.size = 1.4 + Math.random() * 2.4;
        this.alpha = 0.08 + Math.random() * 0.18;
        this.speed = 0.28 + Math.random() * 0.38;
        this.angle = initial ? Math.random() * Math.PI * 2 : 0;
        this.spin = Math.random() * Math.PI * 2;
        this.spinSpeed = (Math.random() - 0.5) * 0.05;
        this.hollow = Math.random() > 0.45;
        this.radiusX = (isMobile ? 92 : 118) + Math.random() * (isMobile ? 34 : 52);
        this.radiusY = (isMobile ? 50 : 60) + Math.random() * (isMobile ? 28 : 40);
        this.offsetY = (Math.random() - 0.5) * (isMobile ? 34 : 46);

        const palette = [COLORS.cyan, COLORS.magenta, COLORS.white];
        this.color = palette[Math.floor(Math.random() * palette.length)];
      }

      update(dt) {
        this.angle += dt * this.speed;
        this.spin += this.spinSpeed;
      }

      draw() {
        const appear = clamp((intro - 0.58) / 0.24, 0, 1);
        if (appear <= 0) return;

        const centerX = cx + this.side * (isMobile ? 76 : 98) + pointer.x * this.side * 10;
        const centerY = bouquet.stemTopY - (isMobile ? 4 : 10) + this.offsetY * 0.22 + pointer.y * 5;

        const x = centerX + Math.cos(this.angle) * this.radiusX * 0.62;
        const y = centerY + Math.sin(this.angle) * this.radiusY * 0.90;

        const depth = (Math.sin(this.angle) + 1) / 2;
        const drawAlpha = this.alpha * (0.4 + depth * 0.7) * appear;
        const scale = 0.72 + depth * 0.45;

        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.rotate(this.spin);
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(${this.color}, ${drawAlpha})`;

        if (this.hollow) {
          ctx.strokeStyle = `rgba(${this.color}, ${drawAlpha})`;
          ctx.lineWidth = 1.1;
          ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
        } else {
          ctx.fillStyle = `rgba(${this.color}, ${drawAlpha})`;
          ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        }

        ctx.restore();
      }
    }

    class VortexParticle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.color = [COLORS.cyan, COLORS.magenta, COLORS.white][Math.floor(Math.random() * 3)];
        this.size = 1.4 + Math.random() * 2.8;
        this.isHollow = Math.random() > 0.5;
        this.spinAngle = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.08;
        this.progress = initial ? Math.random() : 0;
        this.speed = 0.0018 + Math.random() * 0.0018;
        this.side = Math.random() > 0.5 ? 1 : -1;
        const spawnAngle = this.side === 1 ? 0 : Math.PI;
        this.startAngle = spawnAngle + (Math.random() - 0.5) * 1.2;
      }

      update() {
        this.progress += this.speed;
        this.spinAngle += this.rotSpeed;

        if (this.progress >= 1) {
          this.reset();
        }
      }

      draw() {
        const appear = clamp((intro - 0.52) / 0.26, 0, 1);
        if (appear <= 0) return;

        const startY = bouquet.stemTopY - (isMobile ? 35 : 45);
        const endY = bouquet.tieY - 4;
        const currentY = startY + this.progress * (endY - startY);

        const baseRadius = (isMobile ? 95 : 130);
        const currentRadius = (baseRadius * 1.15) * (1 - this.progress * 0.82);

        const rotations = 1.45;
        const currentAngle =
          this.startAngle +
          (this.progress * Math.PI * 2 * rotations) * this.side +
          (time * 0.9 * this.side) +
          (pointer.x * 0.35 * this.side);

        const x3d = Math.cos(currentAngle) * currentRadius * (isMobile ? 1.12 : 1.0);
        const z3d = Math.sin(currentAngle) * currentRadius;

        const focalLength = 420;
        const scale3d = focalLength / (focalLength + z3d);

        const drawX = cx + pointer.x * 12 + x3d * scale3d;
        const drawY = currentY + pointer.y * 6;
        const drawScale = scale3d;
        let drawOpacity = (1 - this.progress) * 0.82 * appear;

        if (drawOpacity > 0.72) drawOpacity = 0.72;
        if (this.progress < 0.12) drawOpacity *= (this.progress / 0.12);
        if (z3d > 0) drawOpacity *= 0.34;

        ctx.save();
        ctx.translate(drawX, drawY);
        ctx.scale(drawScale, drawScale);
        ctx.rotate(this.spinAngle);
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgba(${this.color}, ${drawOpacity})`;

        if (this.isHollow) {
          ctx.strokeStyle = `rgba(${this.color}, ${drawOpacity})`;
          ctx.lineWidth = 1.2;
          ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);
        } else {
          ctx.fillStyle = `rgba(${this.color}, ${drawOpacity})`;
          ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        }

        ctx.restore();
      }
    }

    class Sparkle {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        this.x = cx + (Math.random() - 0.5) * (isMobile ? 170 : 240);
        this.y = bouquet.stemTopY - (isMobile ? 28 : 34) + (Math.random() - 0.5) * (isMobile ? 90 : 120);
        this.r = 0.6 + Math.random() * 1.4;
        this.life = initial ? Math.random() : 1;
        this.decay = 0.008 + Math.random() * 0.014;
        this.alpha = 0.08 + Math.random() * 0.18;
      }

      update() {
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
      }

      draw() {
        const appear = clamp((intro - 0.76) / 0.22, 0, 1);
        if (appear <= 0) return;

        const a = Math.sin(this.life * Math.PI) * this.alpha * appear;
        ctx.save();
        ctx.fillStyle = `rgba(${COLORS.white}, ${a})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgba(${COLORS.white}, ${a})`;
        ctx.beginPath();
        ctx.arc(this.x + pointer.x * 3, this.y + pointer.y * 2, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function buildFlowerLayout() {
      const centerY = isMobile ? h * 0.34 : h * 0.33;
      const spread = isMobile ? 0.84 : 1;

      const cfgs = [
        { x: cx,                y: centerY,          size: isMobile ? 16 : 19, depth: 0.00, delay: 0.34 },
        { x: cx - 42 * spread,  y: centerY + 7,      size: isMobile ? 14 : 17, depth: 0.08, delay: 0.42 },
        { x: cx + 42 * spread,  y: centerY + 7,      size: isMobile ? 14 : 17, depth: 0.08, delay: 0.48 },
        { x: cx - 86 * spread,  y: centerY + 20,     size: isMobile ? 12.4 : 15, depth: 0.18, delay: 0.56 },
        { x: cx + 86 * spread,  y: centerY + 20,     size: isMobile ? 12.4 : 15, depth: 0.18, delay: 0.61 },
        { x: cx - 122 * spread, y: centerY + 30,     size: isMobile ? 10.8 : 13.2, depth: 0.28, delay: 0.67 },
        { x: cx + 122 * spread, y: centerY + 30,     size: isMobile ? 10.8 : 13.2, depth: 0.28, delay: 0.72 },
        { x: cx - 55 * spread,  y: centerY - 24,     size: isMobile ? 9.8 : 11.6, depth: 0.34, delay: 0.78 },
        { x: cx + 55 * spread,  y: centerY - 24,     size: isMobile ? 9.8 : 11.6, depth: 0.34, delay: 0.83 }
      ];

      bouquet.flowers = cfgs.map(cfg => new Flower(cfg));
      bouquet.stemTopY = centerY + (isMobile ? 22 : 24);
      bouquet.tieY = isMobile ? h * 0.69 : h * 0.73;
      bouquet.tieX = cx;
      bouquet.wrapTopY = bouquet.tieY - (isMobile ? 48 : 56);
    }

    function buildSideParticles() {
      bouquet.sideParticles = [];
      const perSide = isMobile ? 16 : 22;

      for (let i = 0; i < perSide; i++) {
        bouquet.sideParticles.push(new SideParticle(-1));
        bouquet.sideParticles.push(new SideParticle(1));
      }
    }

    function buildVortex() {
      bouquet.vortexParticles = [];
      const count = isMobile ? 95 : 130;
      for (let i = 0; i < count; i++) {
        bouquet.vortexParticles.push(new VortexParticle());
      }
    }

    function buildSparkles() {
      bouquet.sparkles = [];
      const count = isMobile ? 14 : 22;
      for (let i = 0; i < count; i++) {
        bouquet.sparkles.push(new Sparkle());
      }
    }

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cx = w / 2;
      cy = h / 2;
      isMobile = w <= 768;

      buildFlowerLayout();
      buildSideParticles();
      buildVortex();
      buildSparkles();
    }

    function drawBackgroundGlow() {
      const g = ctx.createRadialGradient(
        cx + pointer.x * 18,
        h * 0.34 + pointer.y * 10,
        10,
        cx,
        h * 0.35,
        isMobile ? 180 : 250
      );

      g.addColorStop(0, 'rgba(255,220,0,0.06)');
      g.addColorStop(0.35, 'rgba(255,0,120,0.028)');
      g.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
    }

    function drawHalo() {
      const p = clamp((intro - 0.60) / 0.22, 0, 1);
      if (p <= 0) return;

      const alpha = 0.08 * easeInOutSine(p);
      const radius = isMobile ? 118 : 155;

      const halo = ctx.createRadialGradient(
        cx + pointer.x * 16,
        bouquet.stemTopY - 20 + pointer.y * 10,
        10,
        cx,
        bouquet.stemTopY - 18,
        radius
      );

      halo.addColorStop(0, `rgba(${COLORS.white}, ${alpha})`);
      halo.addColorStop(0.34, `rgba(${COLORS.cyan}, ${alpha * 0.9})`);
      halo.addColorStop(0.68, `rgba(${COLORS.magenta}, ${alpha * 0.34})`);
      halo.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, w, h);
    }

    function drawBase() {
      const p = clamp(intro / 0.18, 0, 1);
      if (p <= 0) return;

      const t = easeOutCubic(p);
      const baseY = bouquet.tieY + 7;
      const ringScale = lerp(0.4, 1, t);

      ctx.save();
      ctx.translate(cx, baseY);
      ctx.scale(ringScale, ringScale * 0.34);
      ctx.beginPath();
      ctx.arc(0, 0, isMobile ? 30 : 36, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${COLORS.magenta}, 0.88)`;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 18;
      ctx.shadowColor = `rgba(${COLORS.magenta}, 0.76)`;
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(cx, baseY - 2);
      ctx.scale(1, 0.28);
      ctx.beginPath();
      ctx.arc(0, 0, isMobile ? 18 : 22, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${COLORS.cyan}, 0.90)`;
      ctx.lineWidth = 2.5;
      ctx.shadowBlur = 15;
      ctx.shadowColor = `rgba(${COLORS.cyan}, 0.72)`;
      ctx.stroke();
      ctx.restore();

      const standH = isMobile ? 16 : 20;
      const standW = isMobile ? 18 : 20;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cx, baseY + 2);
      ctx.lineTo(cx - standW / 2, baseY + standH);
      ctx.lineTo(cx + standW / 2, baseY + standH);
      ctx.closePath();
      ctx.fillStyle = `rgba(${COLORS.magenta}, 0.14)`;
      ctx.strokeStyle = `rgba(${COLORS.magenta}, 0.72)`;
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 12;
      ctx.shadowColor = `rgba(${COLORS.magenta}, 0.42)`;
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawStemWrap() {
      const p = clamp((intro - 0.18) / 0.2, 0, 1);
      if (p <= 0) return;

      const t = easeOutCubic(p);
      const topY = lerp(bouquet.tieY, bouquet.wrapTopY, t);
      const bottomY = bouquet.tieY + 8;

      const topHalf = isMobile ? 22 : 26;
      const bottomHalf = isMobile ? 14 : 16;

      ctx.save();

      const grad = ctx.createLinearGradient(cx, topY, cx, bottomY);
      grad.addColorStop(0, 'rgba(255,255,255,0.04)');
      grad.addColorStop(0.40, 'rgba(0,243,255,0.08)');
      grad.addColorStop(1, 'rgba(255,0,120,0.10)');

      ctx.beginPath();
      ctx.moveTo(cx - topHalf, topY);
      ctx.lineTo(cx - bottomHalf, bottomY);
      ctx.lineTo(cx + bottomHalf, bottomY);
      ctx.lineTo(cx + topHalf, topY);
      ctx.closePath();

      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.16)';
      ctx.lineWidth = 1;
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(0,243,255,0.15)';
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx - topHalf + 6, topY + 4);
      ctx.lineTo(cx - bottomHalf + 3, bottomY - 2);
      ctx.moveTo(cx + topHalf - 6, topY + 4);
      ctx.lineTo(cx + bottomHalf - 3, bottomY - 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.restore();
    }

    function drawRibbon() {
      const p = clamp((intro - 0.22) / 0.18, 0, 1);
      if (p <= 0) return;

      const t = easeOutCubic(p);

      ctx.save();
      ctx.translate(cx, bouquet.tieY + 1);
      ctx.scale(t, t);

      ctx.shadowBlur = 10;
      ctx.shadowColor = `rgba(${COLORS.magenta}, 0.40)`;
      ctx.fillStyle = `rgba(${COLORS.magenta}, 0.16)`;
      ctx.strokeStyle = `rgba(${COLORS.magenta}, 0.8)`;
      ctx.lineWidth = 1.3;

      ctx.beginPath();
      ctx.roundRect(-12, -5, 24, 10, 4);
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(-12, 0);
      ctx.quadraticCurveTo(-24, -8, -34, -1);
      ctx.quadraticCurveTo(-24, 5, -12, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(12, 0);
      ctx.quadraticCurveTo(24, -8, 34, -1);
      ctx.quadraticCurveTo(24, 5, 12, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }

    function drawStems() {
      const p = clamp((intro - 0.20) / 0.24, 0, 1);
      if (p <= 0) return;

      const originX = bouquet.tieX + pointer.x * 5;
      const originY = bouquet.tieY - 4 + pointer.y * 4;

      bouquet.flowers.forEach(f => f.drawStem(originX, originY));
    }

    function drawScene() {
      ctx.clearRect(0, 0, w, h);

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(2,2,2,0.28)';
      ctx.fillRect(0, 0, w, h);

      drawBackgroundGlow();

      ctx.globalCompositeOperation = 'lighter';

      drawHalo();
      drawBase();
      drawStems();
      drawStemWrap();

      bouquet.sideParticles.forEach(p => p.draw());
      bouquet.vortexParticles.forEach(p => p.draw());
      bouquet.sparkles.forEach(s => s.draw());
      bouquet.flowers.forEach(f => f.draw());

      drawRibbon();

      ctx.globalCompositeOperation = 'source-over';
    }

    function update(dt) {
      time += dt;
      intro = Math.min(1.2, intro + dt * 0.28);

      pointer.x = lerp(pointer.x, pointer.tx, 0.06);
      pointer.y = lerp(pointer.y, pointer.ty, 0.06);

      bouquet.sideParticles.forEach(p => p.update(dt));
      bouquet.vortexParticles.forEach(p => p.update());
      bouquet.sparkles.forEach(s => s.update());
    }

    function setPointer(clientX, clientY) {
      const nx = (clientX / w - 0.5) * 2;
      const ny = (clientY / h - 0.5) * 2;
      pointer.tx = clamp(nx, -1, 1) * 0.9;
      pointer.ty = clamp(ny, -1, 1) * 0.55;
    }

    window.addEventListener('mousemove', (e) => {
      setPointer(e.clientX, e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
      if (!e.touches || !e.touches[0]) return;
      setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    window.addEventListener('mouseleave', () => {
      pointer.tx = 0;
      pointer.ty = 0;
    });

    window.addEventListener('touchend', () => {
      pointer.tx = 0;
      pointer.ty = 0;
    });

    window.addEventListener('resize', resize);

    let last = performance.now();

    function animate(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      update(dt);
      drawScene();
      requestAnimationFrame(animate);
    }

    resize();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
